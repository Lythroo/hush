plugins {
	id 'net.fabricmc.fabric-loom' version "${loom_version}"
	id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

repositories {
	// Mod Menu (TerraformersMC) for the in-game config button.
	maven { url = "https://maven.terraformersmc.com/releases" }
}

loom {
	splitEnvironmentSourceSets()

	mods {
		"hush" {
			sourceSet sourceSets.main
			sourceSet sourceSets.client
		}
	}

}

// Shared, loader-agnostic core (see D:\Mods\hush-core). The neutral tier compiles on every target;
// the mc26 tier is the 26.x retained-mode GUI + mixin, shared by both 26.x loaders. Both are
// client-only code, so they belong to Fabric's split "client" source set.
sourceSets.client.java.srcDir("../hush-core/neutral")
sourceSets.client.java.srcDir("../hush-core/gui-modern")

dependencies {
	// To change the versions see the gradle.properties file
	minecraft "com.mojang:minecraft:${project.minecraft_version}"
	
	implementation "net.fabricmc:fabric-loader:${project.loader_version}"

	// Fabric API. This is technically optional, but you probably want it anyway.
	implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_api_version}"

	// Mod Menu — optional at runtime (only its entrypoint loads it); bundled in dev for testing.
	implementation "com.terraformersmc:modmenu:${project.modmenu_version}"
}

processResources {
	def version = project.version
	inputs.property "version", version

	filesMatching("fabric.mod.json") {
		expand "version": version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 25
}

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_25
	targetCompatibility = JavaVersion.VERSION_25
}

jar {
	def projectName = project.name
	inputs.property "projectName", projectName

	from("LICENSE") {
		rename { "${it}_$projectName"}
	}
}

// configure the maven publication
publishing {
	publications {
		create("mavenJava", MavenPublication) {
			from components.java
		}
	}

	// See https://docs.gradle.org/current/userguide/publishing_maven.html for information on how to set up publishing.
	repositories {
		// Add repositories to publish to here.
		// Notice: This block does NOT have the same function as the block in the top level.
		// The repositories here will be used for publishing your artifact, not for
		// retrieving dependencies.
	}
}
